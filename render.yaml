services:
  - type: web
    name: online-school
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python seed.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: online-school-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
      - key: BOT_TOKEN
        sync: false
    disks:
      - name: uploads
        mountPath: /app/static/uploads
        sizeGB: 1

  - type: worker
    name: online-school-bot
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: online-school-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
      - key: BOT_TOKEN
        sync: false
    disks:
      - name: uploads
        mountPath: /app/static/uploads
        sizeGB: 1

databases:
  - name: online-school-db
    region: frankfurt
    plan: free
    databaseName: online_school
    ipAllowList: []
